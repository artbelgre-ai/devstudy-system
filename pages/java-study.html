<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Java Study</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --bg: #0e0f11;
    --card: #1c1f24;
    --border: #2a2f36;
    --primary: #e53935;
    --text: #e6e6e6;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
}

.sidebar {
    width: 70px;
    background: var(--card);
    border-right: 1px solid var(--border);
    transition: 0.3s;
    overflow: hidden;
}

.sidebar:hover {
    width: 240px;
}

.sidebar:hover ~ .main {
    filter: blur(2px) brightness(0.7);
    pointer-events: none;
}

.sidebar-header {
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.sidebar-header span {
    display: none;
}

.sidebar:hover .sidebar-header span {
    display: inline;
    color: var(--primary);
    font-weight: bold;
}

.step {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    cursor: pointer;
    opacity: 0.5;
    transition: 0.2s;
}

.step:hover {
    background: rgba(255,255,255,0.05);
    opacity: 1;
}

.step.active {
    border-left: 3px solid var(--primary);
    background: rgba(229,57,53,0.1);
    opacity: 1;
}

.step span {
    display: none;
}

.sidebar:hover .step span {
    display: inline;
}

.main {
    flex: 1;
    padding: 30px;
}

.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
}

.brand span {
    color: var(--primary);
}

.current-badge {
    padding: 8px 14px;
    border: 1px solid var(--primary);
    border-radius: 20px;
    font-size: 13px;
    background: rgba(229,57,53,0.1);
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
}

.current-badge span {
    color: white;
    font-weight: 600;
}

.note {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    height: 80%;
    display: flex;
    flex-direction: column;
}

/* 🔥 NOVO VISUAL DO TEXTAREA */
textarea {
    flex: 1;
    background: #16181d;
    border: 1px solid var(--border);
    color: white;
    border-radius: 10px;
    padding: 15px;
    resize: none;
    font-size: 15px;
    outline: none;

    /* efeito LED sutil */
    box-shadow: inset 0 0 5px rgba(229,57,53,0.05);
    transition: 0.2s;
}

textarea:focus {
    border: 1px solid var(--primary);
    box-shadow: 0 0 10px rgba(229,57,53,0.3);
}

/* 🔥 BOTÃO FECHAR MELHOR POSICIONADO */
#closeNote {
    display: none;
    margin-top: 12px;
    align-self: flex-end;
    cursor: pointer;
    font-size: 12px;
    color: #bbb;
}

#closeNote:hover {
    color: white;
}

/* HISTÓRICO */
.history {
    max-height: 120px;
    overflow-y: auto;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
}

.history-item {
    font-size: 12px;
    padding: 5px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.history-item:hover {
    background: rgba(255,255,255,0.05);
}

.note-header {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--primary);
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    display: flex;
    flex-direction: column;
    gap: 14px; /* 🔥 MAIS ESPAÇO */
}

.footer-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status {
    font-size: 12px;
    color: #777;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* 🔥 BOTÃO MELHORADO */
.btn-save {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--primary);
    color: var(--primary);
    background: none;
    padding: 10px 16px; /* 🔥 MAIS RESPIRO */
    cursor: pointer;
    border-radius: 8px;
    margin-top: 5px;
    transition: 0.2s;
}

.btn-save:hover {
    background: var(--primary);
    color: white;
}
</style>
</head>

<body>

<nav class="sidebar">

    <div class="sidebar-header">
        <i data-lucide="layers"></i>
        <span>Java Stack</span>
    </div>

    <div class="step active" onclick="setTopic('Lógica')">
        <i data-lucide="brain"></i>
        <span>Lógica</span>
    </div>

    <div class="step" onclick="setTopic('Condicionais')">
        <i data-lucide="git-branch"></i>
        <span>Condicionais</span>
    </div>

    <div class="step" onclick="setTopic('Loops')">
        <i data-lucide="repeat"></i>
        <span>Loops</span>
    </div>

    <div class="step" onclick="setTopic('POO')">
        <i data-lucide="box"></i>
        <span>POO</span>
    </div>

</nav>

<main class="main">

    <div class="top">
        <div class="brand">
            <i data-lucide="cpu"></i>
            <div>JAVA <span>STACK</span></div>
        </div>

        <div class="current-badge">
            <i data-lucide="activity"></i>
            ESTUDO ATUAL:
            <span id="title">Lógica</span>
        </div>
    </div>

    <div class="note">
        <div class="note-header">
            <i data-lucide="edit-3"></i>
            NOTAS DE ESTUDO
        </div>

        <textarea id="note"></textarea>

        <div id="closeNote">❌ Fechar visualização</div>

        <div class="footer">

            <div class="footer-top">
                <div class="status" id="status">
                    <i data-lucide="clock"></i>
                    Nenhuma nota salva nesta sessão.
                </div>

                <button class="btn-save" onclick="save()">
                    <i data-lucide="save"></i>
                    <span>Salvar</span>
                </button>
            </div>

            <div id="history" class="history"></div>

        </div>
    </div>

</main>

<script>
lucide.createIcons();

let viewingMode = false;

function getHistoryKey() {
    const topic = localStorage.getItem("current_java_topic") || "Lógica";
    return "history_" + topic.replace(/\s+/g, "_");
}

window.addEventListener("load", () => {
    const topic = localStorage.getItem("current_java_topic") || "Lógica";
    document.getElementById("title").innerText = topic;
    renderHistory();
});

function setTopic(name) {

    viewingMode = false;
    document.getElementById("closeNote").style.display = "none";

    localStorage.setItem("current_java_topic", name);

    document.getElementById("title").innerText = name;
    document.getElementById("note").value = "";
    document.getElementById("note").removeAttribute("readonly");

    document.querySelectorAll(".step").forEach(el => {
        el.classList.remove("active");
    });

    event.currentTarget.classList.add("active");

    renderHistory();
}

function save() {

    if (viewingMode) return;

    const text = document.getElementById("note").value;
    if (!text) return;

    let history = JSON.parse(localStorage.getItem(getHistoryKey())) || [];

    history.push({
        content: text,
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    localStorage.setItem(getHistoryKey(), JSON.stringify(history));

    document.getElementById("note").value = "";

    document.getElementById("status").innerHTML =
        `<i data-lucide="clock"></i> Salvo agora`;

    renderHistory();
    lucide.createIcons();
}

function renderHistory() {

    const container = document.getElementById("history");
    container.innerHTML = "";

    let history = JSON.parse(localStorage.getItem(getHistoryKey())) || [];

    history.slice().reverse().forEach((item, index) => {

        const div = document.createElement("div");
        div.className = "history-item";

        div.innerHTML = `
            📄 [${item.time}] ${item.content.substring(0, 25)}...
            <span style="float:right; cursor:pointer;" onclick="deleteItem(${history.length - 1 - index}, event)">🗑️</span>
        `;

        div.onclick = () => openNote(item.content);

        container.appendChild(div);
    });
}

function openNote(content) {

    const textarea = document.getElementById("note");

    textarea.value = content;
    textarea.setAttribute("readonly", true);

    document.getElementById("closeNote").style.display = "block";

    viewingMode = true;
}

document.getElementById("closeNote").onclick = function() {

    const textarea = document.getElementById("note");

    textarea.value = "";
    textarea.removeAttribute("readonly");

    this.style.display = "none";

    viewingMode = false;
};

function deleteItem(index, event) {

    event.stopPropagation();

    let history = JSON.parse(localStorage.getItem(getHistoryKey())) || [];

    history.splice(index, 1);

    localStorage.setItem(getHistoryKey(), JSON.stringify(history));

    renderHistory();
}
</script>

</body>
</html>
